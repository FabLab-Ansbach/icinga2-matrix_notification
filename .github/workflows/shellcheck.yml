name: ShellCheck Linting

on:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'scripts/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    container:
      image: koalaman/shellcheck-alpine:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh
